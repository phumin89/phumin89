<svg width="1280" height="260" viewBox="0 0 1280 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">mi.nie profile header</title>
  <desc id="desc">Minimal custom header for mi.nie designed for GitHub dark mode.</desc>
  <defs>
    <filter id="blur-xl" x="0" y="0" width="1280" height="260" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <linearGradient id="accent-line" x1="942" y1="64" x2="1160" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#457B9D" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#A8DADC"/>
      <stop offset="1" stop-color="#E63946"/>
    </linearGradient>
  </defs>

  <g filter="url(#blur-xl)" opacity="0.9">
    <ellipse cx="860" cy="122" rx="238" ry="92" fill="#457B9D" fill-opacity="0.28"/>
    <ellipse cx="1048" cy="176" rx="138" ry="58" fill="#E63946" fill-opacity="0.18"/>
    <ellipse cx="712" cy="104" rx="124" ry="76" fill="#A8DADC" fill-opacity="0.16"/>
  </g>

  <rect x="76" y="58" width="54" height="8" rx="4" fill="#E63946"/>

  <text x="76" y="104" fill="#A8DADC" font-size="14" font-weight="700" font-family="Segoe UI, Arial, sans-serif" letter-spacing="2.6">
    SOFTWARE / SOFT CHAOS / SIDE QUESTS
  </text>

  <text x="76" y="168" fill="#F1FAEE" font-size="82" font-weight="700" font-family="Segoe UI, Arial, sans-serif" letter-spacing="-3">
    mi.nie
  </text>

  <text x="78" y="206" fill="#F1FAEE" fill-opacity="0.82" font-size="24" font-weight="500" font-family="Segoe UI, Arial, sans-serif">
    code, cats, unfinished side quests
  </text>

  <rect x="944" y="60" width="214" height="2" rx="1" fill="url(#accent-line)"/>
  <circle cx="1162" cy="61" r="6" fill="#E63946"/>

  <rect x="946" y="158" width="92" height="12" rx="6" fill="#F1FAEE" fill-opacity="0.14"/>
  <rect x="1050" y="158" width="68" height="12" rx="6" fill="#A8DADC" fill-opacity="0.92"/>
  <rect x="1128" y="158" width="34" height="12" rx="6" fill="#E63946"/>
</svg>
