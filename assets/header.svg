<svg width="1280" height="300" viewBox="0 0 1280 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">mi.nie developer identity card</title>
  <desc id="desc">A colorful developer-style identity card for the GitHub profile of mi.nie.</desc>
  <defs>
    <linearGradient id="top-band" x1="20" y1="20" x2="1260" y2="20" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E63946"/>
      <stop offset="0.45" stop-color="#A8DADC"/>
      <stop offset="1" stop-color="#457B9D"/>
    </linearGradient>
    <filter id="glow-cyan" x="760" y="20" width="430" height="260" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
    <filter id="glow-red" x="900" y="90" width="260" height="180" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="1240" height="260" rx="24" fill="#0F172A"/>
  <rect x="20" y="20" width="1240" height="260" rx="24" stroke="#25324A" stroke-width="2"/>
  <rect x="20" y="20" width="1240" height="8" rx="4" fill="url(#top-band)"/>

  <g filter="url(#glow-cyan)" opacity="0.34">
    <ellipse cx="974" cy="128" rx="138" ry="76" fill="#A8DADC"/>
  </g>
  <g filter="url(#glow-red)" opacity="0.28">
    <ellipse cx="1032" cy="188" rx="76" ry="42" fill="#E63946"/>
  </g>

  <rect x="70" y="74" width="96" height="96" rx="16" fill="#111B31" stroke="#34445E" stroke-width="2"/>
  <text x="90" y="133" fill="#F1FAEE" font-size="34" font-weight="700" font-family="Consolas, 'Courier New', monospace">&lt;/&gt;</text>

  <text x="200" y="112" fill="#F1FAEE" font-size="64" font-weight="700" font-family="Segoe UI, Arial, sans-serif" letter-spacing="-2">
    mi.nie
  </text>
  <text x="202" y="147" fill="#A8DADC" font-size="18" font-weight="700" font-family="Consolas, 'Courier New', monospace" letter-spacing="1.5">
    FULL-STACK DEVELOPER
  </text>
  <text x="202" y="184" fill="#F1FAEE" fill-opacity="0.84" font-size="22" font-weight="500" font-family="Segoe UI, Arial, sans-serif">
    builds dashboard systems, backend flows, and dev tools
  </text>

  <rect x="202" y="208" width="132" height="28" rx="14" fill="#1D3557"/>
  <rect x="344" y="208" width="132" height="28" rx="14" fill="#457B9D"/>
  <rect x="486" y="208" width="124" height="28" rx="14" fill="#E63946"/>
  <text x="225" y="227" fill="#F1FAEE" font-size="13" font-weight="700" font-family="Consolas, 'Courier New', monospace">typescript</text>
  <text x="378" y="227" fill="#F1FAEE" font-size="13" font-weight="700" font-family="Consolas, 'Courier New', monospace">react + fastify</text>
  <text x="523" y="227" fill="#F1FAEE" font-size="13" font-weight="700" font-family="Consolas, 'Courier New', monospace">automation</text>

  <text x="792" y="96" fill="#E63946" font-size="18" font-weight="700" font-family="Consolas, 'Courier New', monospace">&gt;</text>
  <text x="818" y="96" fill="#F1FAEE" font-size="18" font-weight="700" font-family="Consolas, 'Courier New', monospace">stack</text>
  <text x="898" y="96" fill="#A8DADC" font-size="18" font-weight="500" font-family="Consolas, 'Courier New', monospace">ts / react / fastify / prisma</text>

  <text x="792" y="136" fill="#457B9D" font-size="18" font-weight="700" font-family="Consolas, 'Courier New', monospace">&gt;</text>
  <text x="818" y="136" fill="#F1FAEE" font-size="18" font-weight="700" font-family="Consolas, 'Courier New', monospace">ships</text>
  <text x="898" y="136" fill="#F1FAEE" fill-opacity="0.9" font-size="18" font-weight="500" font-family="Consolas, 'Courier New', monospace">pocketledger / render3d-tools</text>

  <text x="792" y="176" fill="#A8DADC" font-size="18" font-weight="700" font-family="Consolas, 'Courier New', monospace">&gt;</text>
  <text x="818" y="176" fill="#F1FAEE" font-size="18" font-weight="700" font-family="Consolas, 'Courier New', monospace">likes</text>
  <text x="898" y="176" fill="#F1FAEE" fill-opacity="0.82" font-size="18" font-weight="500" font-family="Consolas, 'Courier New', monospace">code / cats / side quests</text>

  <rect x="792" y="214" width="358" height="2" rx="1" fill="#25324A"/>
  <rect x="792" y="214" width="118" height="2" rx="1" fill="#E63946"/>
  <rect x="928" y="214" width="112" height="2" rx="1" fill="#A8DADC"/>
  <rect x="1060" y="214" width="90" height="2" rx="1" fill="#457B9D"/>
</svg>
