<svg width="1000" height="872" viewBox="0 0 1000 872" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">mi.nie business card layout</title>
  <desc id="desc">Two stacked business-card style panels for mi.nie using standard business card proportions.</desc>
  <defs>
    <filter id="shadow" x="0" y="0" width="1000" height="872" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Standard business-card ratio: 3.5 : 2 -->
  <g filter="url(#shadow)">
    <rect x="150" y="36" width="700" height="400" rx="4" fill="#FBFBF9"/>
    <rect x="150" y="472" width="700" height="400" rx="4" fill="#FBFBF9"/>
  </g>

  <!-- Card 1: logo + name only -->
  <g>
    <rect x="359" y="189" width="84" height="84" rx="3" stroke="#151515" stroke-width="3"/>
    <path d="M381 257L421 207" stroke="#151515" stroke-width="3.5" stroke-linecap="round"/>
    <text x="382" y="233" fill="#151515" font-size="31" font-weight="700" font-family="Segoe UI, Arial, sans-serif">m</text>
    <text x="406" y="261" fill="#151515" font-size="31" font-weight="700" font-family="Segoe UI, Arial, sans-serif">n</text>

    <text x="464" y="249" fill="#151515" font-size="62" font-weight="700" font-family="Segoe UI, Arial, sans-serif" letter-spacing="-1.5">
      mi.nie
    </text>
  </g>

  <!-- Card 2: details -->
  <g>
    <text x="220" y="646" fill="#151515" font-size="58" font-weight="700" font-family="Segoe UI, Arial, sans-serif" letter-spacing="-1.2">
      MI.NIE
    </text>
    <text x="222" y="682" fill="#353535" font-size="24" font-weight="500" font-family="Segoe UI, Arial, sans-serif" letter-spacing="0.8">
      full-stack developer
    </text>

    <rect x="435" y="605" width="1" height="92" fill="#C9C9C6"/>

    <circle cx="478" cy="620" r="5" fill="#151515"/>
    <text x="498" y="626" fill="#151515" font-size="20" font-weight="500" font-family="Segoe UI, Arial, sans-serif">
      dashboard-first products
    </text>

    <circle cx="478" cy="656" r="5" fill="#4C4C4C"/>
    <text x="498" y="662" fill="#151515" font-size="20" font-weight="500" font-family="Segoe UI, Arial, sans-serif">
      readable backend flows
    </text>

    <circle cx="478" cy="692" r="5" fill="#9B9B98"/>
    <text x="498" y="698" fill="#151515" font-size="20" font-weight="500" font-family="Segoe UI, Arial, sans-serif">
      automation that removes repetition
    </text>

    <circle cx="218" cy="778" r="6" fill="#151515"/>
    <text x="238" y="785" fill="#4A4A4A" font-size="18" font-weight="500" font-family="Segoe UI, Arial, sans-serif">
      Chiang Mai, Thailand
    </text>
  </g>
</svg>
