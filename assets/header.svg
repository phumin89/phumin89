<svg width="1200" height="780" viewBox="0 0 1200 780" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">mi.nie business card layout</title>
  <desc id="desc">Two stacked business-card style panels for mi.nie using standard business card proportions.</desc>
  <defs>
    <filter id="shadow" x="0" y="0" width="1200" height="780" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Standard business-card ratio: 3.5 : 2 -->
  <g filter="url(#shadow)">
    <rect x="55" y="28" width="1090" height="623" rx="4" fill="#FBFBF9"/>
  </g>

  <!-- Card 1: logo + name only -->
  <g>
    <rect x="432" y="126" width="84" height="84" rx="3" stroke="#151515" stroke-width="3"/>
    <path d="M454 194L494 144" stroke="#151515" stroke-width="3.5" stroke-linecap="round"/>
    <text x="462" y="156" fill="#151515" font-size="31" font-weight="700" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">m</text>
    <text x="487" y="182" fill="#151515" font-size="31" font-weight="700" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">n</text>

    <text x="538" y="186" fill="#151515" font-size="62" font-weight="700" font-family="Segoe UI, Arial, sans-serif" letter-spacing="-1.5">
      mi.nie
    </text>
  </g>

  <rect x="120" y="338" width="960" height="1" fill="#D7D7D4"/>

  <!-- Card 2: details -->
  <g>
    <text x="195" y="476" fill="#151515" font-size="58" font-weight="700" font-family="Segoe UI, Arial, sans-serif" letter-spacing="-1.2">
      MI.NIE
    </text>
    <text x="197" y="512" fill="#353535" font-size="24" font-weight="500" font-family="Segoe UI, Arial, sans-serif" letter-spacing="0.8">
      full-stack developer
    </text>

    <rect x="412" y="435" width="1" height="92" fill="#C9C9C6"/>

    <circle cx="458" cy="450" r="5" fill="#151515"/>
    <text x="478" y="456" fill="#151515" font-size="20" font-weight="500" font-family="Segoe UI, Arial, sans-serif">
      dashboard-first products
    </text>

    <circle cx="458" cy="486" r="5" fill="#4C4C4C"/>
    <text x="478" y="492" fill="#151515" font-size="20" font-weight="500" font-family="Segoe UI, Arial, sans-serif">
      readable backend flows
    </text>

    <circle cx="458" cy="522" r="5" fill="#9B9B98"/>
    <text x="478" y="528" fill="#151515" font-size="20" font-weight="500" font-family="Segoe UI, Arial, sans-serif">
      automation that removes repetition
    </text>

    <circle cx="195" cy="598" r="6" fill="#151515"/>
    <text x="215" y="605" fill="#4A4A4A" font-size="18" font-weight="500" font-family="Segoe UI, Arial, sans-serif">
      Chiang Mai, Thailand
    </text>
  </g>
</svg>
