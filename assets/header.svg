<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">mi.nie profile header</title>
  <desc id="desc">Custom profile header for mi.nie with soft motion and a red, cream, mint, blue, and navy palette.</desc>
  <defs>
    <linearGradient id="surface" x1="64" y1="36" x2="1226" y2="284" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D3557"/>
      <stop offset="0.52" stop-color="#457B9D"/>
      <stop offset="1" stop-color="#1D3557"/>
    </linearGradient>
    <linearGradient id="sheen" x1="188" y1="64" x2="1070" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A8DADC" stop-opacity="0"/>
      <stop offset="0.48" stop-color="#F1FAEE" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#E63946" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur-lg" x="0" y="0" width="1280" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
    <filter id="blur-sm" x="0" y="0" width="1280" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect x="12" y="12" width="1256" height="296" rx="26" fill="#1D3557"/>
  <rect x="12" y="12" width="1256" height="296" rx="26" fill="url(#surface)"/>

  <g filter="url(#blur-lg)" opacity="0.9">
    <ellipse cx="348" cy="114" rx="208" ry="132" fill="#A8DADC" fill-opacity="0.28">
      <animate attributeName="cx" values="348;382;348" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="114;126;114" dur="12s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="1032" cy="236" rx="214" ry="96" fill="#E63946" fill-opacity="0.26">
      <animate attributeName="cx" values="1032;998;1032" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.18;0.32;0.18" dur="8s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <g filter="url(#blur-sm)">
    <rect x="564" y="38" width="424" height="2" rx="1" fill="url(#sheen)" opacity="0.7">
      <animate attributeName="x" values="564;592;564" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0.8;0.45" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect x="80" y="72" width="62" height="8" rx="4" fill="#E63946"/>

  <text x="78" y="150" fill="#F1FAEE" font-size="72" font-weight="700" font-family="Segoe UI, Arial, sans-serif" letter-spacing="-2">
    mi.nie
  </text>
  <circle cx="352" cy="126" r="10" fill="#E63946">
    <animate attributeName="r" values="10;12;10" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <text x="80" y="196" fill="#F1FAEE" fill-opacity="0.88" font-size="22" font-weight="500" font-family="Segoe UI, Arial, sans-serif">
    code, cats, unfinished side quests
  </text>
</svg>
