<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">mi.nie profile card</title>
  <desc id="desc">Minimal editorial-style profile header for mi.nie using a cream card, navy typography, and soft red, mint, and blue accents.</desc>
  <defs>
    <filter id="shadow" x="0" y="0" width="1280" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1D3557" flood-opacity="0.18"/>
    </filter>
    <clipPath id="card-clip">
      <rect x="24" y="20" width="1232" height="280" rx="28"/>
    </clipPath>
  </defs>

  <g filter="url(#shadow)">
    <rect x="24" y="20" width="1232" height="280" rx="28" fill="#F1FAEE"/>
  </g>

  <g clip-path="url(#card-clip)">
    <rect x="24" y="20" width="1232" height="280" rx="28" fill="#F1FAEE"/>
    <circle cx="1048" cy="102" r="98" fill="#A8DADC"/>
    <rect x="1130" y="50" width="22" height="160" rx="11" fill="#457B9D"/>
    <rect x="1000" y="230" width="166" height="18" rx="9" fill="#E63946"/>
    <rect x="24" y="286" width="1232" height="14" fill="#1D3557"/>
  </g>

  <rect x="82" y="68" width="66" height="10" rx="5" fill="#E63946"/>

  <text x="80" y="172" fill="#1D3557" font-size="86" font-weight="700" font-family="Segoe UI, Arial, sans-serif" letter-spacing="-3">
    mi
  </text>
  <circle cx="214" cy="120" r="12" fill="#E63946"/>
  <text x="242" y="172" fill="#1D3557" font-size="86" font-weight="700" font-family="Segoe UI, Arial, sans-serif" letter-spacing="-3">
    nie
  </text>

  <text x="84" y="216" fill="#457B9D" font-size="23" font-weight="500" font-family="Segoe UI, Arial, sans-serif">
    software, soft chaos, side quests
  </text>

</svg>
